name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Run app tests
        working-directory: app
        run: npm test

      - name: Build Docker image
        working-directory: app
        run: docker build -t platform-demo-app:ci .

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint ./helm/platform-demo-app

      - name: Render Helm chart
        run: helm template platform-demo-app ./helm/platform-demo-app
